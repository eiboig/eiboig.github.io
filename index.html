<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Echo Services — Updates are Underway</title>
  <style>
    :root {
      --bg: #080a0f;
      --surface: #111720;
      --border: rgba(255,255,255,0.08);
      --text: #e8eaf0;
      --muted: #9aa3b2;
      --accent: #00e5c4;
      --danger: #ff6b6b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 760px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 3.5vw, 2.2rem);
    }

    .sub {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.5;
    }

    form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.85rem;
      color: var(--muted);
    }

    input, select, textarea, button {
      font: inherit;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      background: #0d121a;
      color: var(--text);
      border: 1px solid var(--border);
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      grid-column: 1 / -1;
      margin-top: 4px;
      padding: 12px 16px;
      border: 0;
      background: var(--accent);
      color: #03110e;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .status {
      grid-column: 1 / -1;
      display: none;
      padding: 10px 12px;
      border: 1px solid transparent;
      font-size: 0.92rem;
    }

    .status.ok {
      display: block;
      border-color: rgba(0,229,196,0.4);
      color: var(--accent);
      background: rgba(0,229,196,0.1);
    }

    .status.err {
      display: block;
      border-color: rgba(255,107,107,0.35);
      color: var(--danger);
      background: rgba(255,107,107,0.1);
    }

    @media (max-width: 720px) {
      form { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Updates are Underway</h1>
    <p class="sub">The full site is being updated. You can still place a minimal order below and it will be sent to the current backend system.</p>

    <form id="minimalOrderForm">
      <div class="field">
        <label for="discordUsername">Discord Name *</label>
        <input id="discordUsername" name="discordUsername" type="text" placeholder="@username" required />
      </div>

      <div class="field">
        <label for="clientDiscordId">Discord ID *</label>
        <input id="clientDiscordId" name="clientDiscordId" type="text" placeholder="123456789012345678" required />
      </div>

      <div class="field">
        <label for="serverName">Server Name *</label>
        <input id="serverName" name="serverName" type="text" required />
      </div>

      <div class="field">
        <label for="serverInvite">Server Invite Link *</label>
        <input id="serverInvite" name="serverInvite" type="text" placeholder="discord.gg/yourserver" required />
      </div>

      <div class="field full">
        <label for="budget">Budget *</label>
        <select id="budget" name="budget" required>
          <option value="">Select budget...</option>
          <option value="Minimal Order">Minimal Order</option>
          <option value="500 R$ (~$5)">500 R$ (~$5)</option>
          <option value="1,000 R$ (~$10)">1,000 R$ (~$10)</option>
          <option value="Custom — DM me">Custom — DM me</option>
        </select>
      </div>

      <div class="field full">
        <label for="projectDetails">Description *</label>
        <textarea id="projectDetails" name="projectDetails" placeholder="Describe what you need the bot to do..." required></textarea>
      </div>

      <div class="status" id="status"></div>
      <button type="submit" id="submitBtn">Send Minimal Order</button>
    </form>
  </main>

  <script>
    const BACKEND_URL = 'https://palm-card-required-harry.trycloudflare.com';

    const form = document.getElementById('minimalOrderForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusEl = document.getElementById('status');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';
      statusEl.className = 'status';
      statusEl.textContent = '';

      const payload = {
        discordUsername: form.discordUsername.value.trim(),
        clientDiscordId: form.clientDiscordId.value.trim(),
        serverName: form.serverName.value.trim(),
        serverInvite: form.serverInvite.value.trim(),
        budget: form.budget.value,
        projectDetails: form.projectDetails.value.trim(),
        serverType: 'Minimal Order',
        paymentMethod: 'To be discussed'
      };

      try {
        const response = await fetch(`${BACKEND_URL}/inquiry`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Failed to send inquiry');
        }

        statusEl.className = 'status ok';
        statusEl.textContent = data.orderId
          ? `Order sent successfully. Reference ID: ${data.orderId}`
          : 'Order sent successfully.';
        form.reset();
      } catch (error) {
        statusEl.className = 'status err';
        statusEl.textContent = `Could not send order: ${error.message}`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Minimal Order';
      }
    });
  </script>
</body>
</html>
